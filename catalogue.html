<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catalogue PDF</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #222;
      font-family: Arial, sans-serif;
    }
    .topbar {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: #111;
      color: white;
      box-sizing: border-box;
    }
    .topbar a {
      color: white;
      text-decoration: none;
      background: #333;
      padding: 10px 14px;
      border-radius: 8px;
    }
    .viewer {
      height: calc(100% - 56px);
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: white;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div>Catalogue de location</div>
    <a href="/api/catalogue-file" target="_blank" rel="noopener">Ouvrir le PDF seul</a>
  </div>

  <div class="viewer">
    <iframe src="/api/catalogue-file"></iframe>
  </div>
</body>
</html>
