<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catalogue de location</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 40px 20px;
      text-align: center;
      background: #f7f7f7;
    }
    .box {
      max-width: 700px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    a.button {
      display: inline-block;
      margin-top: 20px;
      padding: 14px 22px;
      background: #111;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
    }
    a.button:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Catalogue de location</h1>
    <p>Consultez notre catalogue en ligne.</p>
    <a class="button" href="/catalogue">Ouvrir le catalogue</a>
  </div>
</body>
</html>
